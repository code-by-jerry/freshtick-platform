services:
  - type: web
    name: freshtick
    runtime: php
    plan: starter
    region: singapore
    branch: main
    buildCommand: |
      composer install --no-dev --optimize-autoloader --no-interaction
      npm ci
      npm run build
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
      php artisan event:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: Freshtick
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://freshtick.onrender.com
      - key: APP_TIMEZONE
        value: Asia/Kolkata
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        value: postgres
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: FILESYSTEM_DISK
        value: local
      - key: BCRYPT_ROUNDS
        value: 12
